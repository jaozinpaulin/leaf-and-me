<svg width="100%" height="100%" viewBox="0 0 1200 300" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo base (continuação direta) -->
  <rect width="1200" height="300" fill="#141E24"></rect>

  <!-- Curva descendente (encaixa com a de cima) -->
  <path d="M0,0 C300,60 900,60 1200,0 L1200,300 L0,300 Z" fill="#0F171C" opacity="0.95"></path>

  <!-- Linha final sutil -->
  <rect x="0" y="0" width="1200" height="1" fill="#8FB8A1" opacity="0.1"></rect>

  <!-- Pontos finais (quase invisíveis) -->
  <circle cx="400" cy="180" r="2.5" fill="#8FB8A1" opacity="0.15"></circle>
  <circle cx="800" cy="220" r="2" fill="#8FB8A1" opacity="0.12"></circle>

</svg>
