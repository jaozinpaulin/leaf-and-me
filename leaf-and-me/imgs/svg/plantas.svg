<svg width="100%" height="100%" viewBox="0 0 1200 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo base -->
  <rect width="1200" height="320" fill="#0F171C"></rect>

  <!-- Forma principal (mais compacta) -->
  <path d="M0,40
       C200,20 400,60 600,50
       C800,40 1000,20 1200,40
       L1200,200
       C900,220 300,220 0,200
       Z" fill="#162229" opacity="0.95"></path>

  <!-- Curva FINAL (esta é a que o próximo SVG deve copiar no topo) -->
  <path d="M0,200
       C300,260 900,260 1200,200
       L1200,320
       L0,320
       Z" fill="#1D2B33" opacity="1"></path>

  <!-- Linha guia sutil (opcional, só pra conferência visual) -->
  <rect x="0" y="200" width="1200" height="1" fill="#9FC7AE" opacity="0.06"></rect>

</svg>
