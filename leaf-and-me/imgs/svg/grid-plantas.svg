<svg width="100%" height="100%" viewBox="0 0 1200 320" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">

  <!-- Fundo base -->
  <rect width="1200" height="320" fill="#0F171C"></rect>

  <!-- TOPO: encaixe perfeito com o SVG anterior -->
  <path d="M0,0
       C300,60 900,60 1200,0
       L1200,120
       C900,140 300,140 0,120
       Z" fill="#1D2B33" opacity="1"></path>

  <!-- Camada intermediária (movimento diferente) -->
  <path d="M0,120
       C200,160 400,100 600,120
       C800,140 1000,180 1200,160
       L1200,260
       C800,300 400,300 0,260
       Z" fill="#162229" opacity="0.95"></path>

  <!-- BASE: nova curva (para o PRÓXIMO SVG) -->
  <path d="M0,260
       C350,300 850,300 1200,260
       L1200,320
       L0,320
       Z" fill="#24363F" opacity="1"></path>

</svg>
